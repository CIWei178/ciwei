<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>CIWei｜账号运营</title><meta name="description" content="CIWei 账号运营能力介绍：结合数据表现优化标题、封面、发布时间和后续内容方向。"/><style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #05070d;
      --card: rgba(255, 255, 255, 0.08);
      --card-strong: rgba(255, 255, 255, 0.14);
      --text: #eef3ff;
      --muted: #aab6d3;
      --accent: #43f3ff;
      --accent-2: #7c6dff;
      --line: rgba(255, 255, 255, 0.16);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    html { scroll-behavior: smooth; }
    body {
      min-height: 100vh;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 10%, rgba(124, 109, 255, 0.40), transparent 30rem),
        radial-gradient(circle at 86% 8%, rgba(67, 243, 255, 0.26), transparent 28rem),
        radial-gradient(circle at 50% 90%, rgba(32, 230, 166, 0.12), transparent 34rem),
        linear-gradient(135deg, #030409 0%, var(--bg) 52%, #07101f 100%);
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }
    .wrap { width: min(1120px, calc(100% - 40px)); margin: 0 auto; }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(18px);
      background: rgba(11, 16, 32, 0.72);
      border-bottom: 1px solid var(--line);
    }

    nav {
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .logo {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 12px 30px rgba(124, 92, 255, 0.35);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .nav-links a:hover { color: var(--text); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .btn:hover { transform: translateY(-2px); background: rgba(255,255,255,0.14); }
    .btn.primary { border: 0; background: linear-gradient(135deg, var(--accent), #9d7bff); position: relative; overflow: hidden; isolation: isolate; }
    .btn.primary::before { content:""; position:absolute; inset:-2px; transform: translateX(-130%) skewX(-18deg); background: linear-gradient(90deg, transparent, rgba(255,255,255,.18), rgba(255,255,255,.72), rgba(255,255,255,.18), transparent); animation: shiny-sweep 3.2s cubic-bezier(.22,1,.36,1) infinite; z-index:-1; }
    .btn.primary::after { content:""; position:absolute; inset:1px; border-radius:inherit; background: linear-gradient(135deg, rgba(48,213,200,.86), rgba(157,123,255,.92)); z-index:-2; }
    @keyframes shiny-sweep { 0%, 35% { transform: translateX(-130%) skewX(-18deg); opacity: 0; } 45% { opacity: 1; } 72%, 100% { transform: translateX(130%) skewX(-18deg); opacity: 0; } }
    .btn.primary:hover { background: linear-gradient(135deg, #8d72ff, #b092ff); }

    .hero {
      padding: 86px 0 58px;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      align-items: center;
      gap: 52px;
    }

    .eyebrow {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      color: #c7d2ff;
      background: rgba(124, 92, 255, 0.14);
      border: 1px solid rgba(124, 92, 255, 0.32);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      margin-bottom: 22px;
    }

    h1 {
      font-size: clamp(42px, 7vw, 76px);
      line-height: 0.98;
      letter-spacing: -0.06em;
      margin-bottom: 24px;
    }

    .gradient-text {
      background: linear-gradient(135deg, #ffffff, #b8c8ff 48%, #5df0e3);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .lead {
      max-width: 640px;
      color: var(--muted);
      font-size: 18px;
      margin-bottom: 30px;
    }

    .actions { display: flex; flex-wrap: wrap; gap: 12px; }

    .profile-card {
      position: relative;
      overflow: hidden;
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 32px;
      background: linear-gradient(180deg, rgba(255,255,255,0.13), rgba(255,255,255,0.06));
      box-shadow: var(--shadow);
    }

    .avatar {
      width: 132px;
      height: 176px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 28px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.92), rgba(214,225,255,0.88)),
        linear-gradient(135deg, #ffffff, #a791ff 55%, #30d5c8);
      color: #3b4260;
      overflow: hidden;
      position: relative;
      border: 2px solid rgba(255, 255, 255, 0.72);
      box-shadow: 0 18px 40px rgba(0,0,0,0.28);
      text-align: center;
      line-height: 1.35;
      padding: 12px;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: none;
    }

    .avatar.has-image span { display: none; }
    .avatar.has-image img { display: block; }

    .avatar-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: -10px 0 22px;
    }

    .file-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .file-label:hover { transform: translateY(-2px); background: rgba(255,255,255,0.14); }
    .file-label input { display: none; }

    .text-button {
      min-height: 38px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .text-button:hover { color: var(--text); background: rgba(255,255,255,0.08); }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      color: #d9fffb;
      font-size: 14px;
      margin-bottom: 14px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #30d5c8;
      box-shadow: 0 0 0 8px rgba(48, 213, 200, 0.12);
    }

    .profile-card h2 { font-size: 28px; margin-bottom: 8px; }
    .profile-card p { color: var(--muted); }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 26px;
    }

    .stat {
      padding: 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--line);
    }

    .stat strong { display: block; font-size: 24px; }
    .stat span { color: var(--muted); font-size: 13px; }

    section { padding: 48px 0; }
    .section-title { font-size: clamp(28px, 4vw, 44px); letter-spacing: -0.04em; margin-bottom: 14px; }
    .section-subtitle { color: var(--muted); max-width: 680px; margin-bottom: 26px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .card {
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 26px;
      background: var(--card);
      transition: transform 0.22s ease, background 0.22s ease, border-color 0.22s ease;
    }

    .card:hover { transform: translateY(-5px); background: var(--card-strong); border-color: rgba(255,255,255,0.28); }
    .card .icon { font-size: 30px; margin-bottom: 18px; }
    .card h3 { margin-bottom: 10px; font-size: 20px; }
    .card p { color: var(--muted); }

    .projects {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .project {
      min-height: 230px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 24px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(124, 92, 255, 0.16), rgba(255,255,255,0.07));
    }

    .tag-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 18px; }
    .tag { display:inline-flex; padding: 6px 10px; border: 1px solid var(--line); border-radius: 999px; color: #d8def4; font-size: 12px; text-decoration:none; transition: transform .2s ease, background .2s ease, border-color .2s ease; }
    .tag:hover { transform: translateY(-2px); background: rgba(48,213,200,.12); border-color: rgba(48,213,200,.5); color:#fff; }

    .contact-panel {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 24px;
      padding: 30px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 30px;
      background: linear-gradient(135deg, rgba(48, 213, 200, 0.16), rgba(124, 92, 255, 0.16));
      box-shadow: var(--shadow);
    }

    footer { padding: 34px 0 44px; color: var(--muted); border-top: 1px solid var(--line); }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translate(-50%, 24px);
      opacity: 0;
      pointer-events: none;
      padding: 12px 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(15, 22, 44, 0.92);
      color: var(--text);
      box-shadow: var(--shadow);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    @media (max-width: 820px) {
      .hero, .contact-panel { grid-template-columns: 1fr; }
      .grid, .projects { grid-template-columns: 1fr; }
      .nav-links { display: none; }
      .stats { grid-template-columns: 1fr; }
      .hero { padding-top: 54px; }
    }
  body::before { content:""; position:fixed; inset:0; pointer-events:none; background-image:linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px, transparent 1px); background-size:54px 54px; mask-image:radial-gradient(circle at 50% 20%, black, transparent 72%); opacity:.58; z-index:-1; }
.profile-card, .card, .project, .contact-panel { backdrop-filter: blur(18px); }

@keyframes scan { 0%,45%{transform:translateX(-120%)} 70%,100%{transform:translateX(120%)} }
.card, .project { background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.035)); }

.logo, .avatar { box-shadow: 0 0 40px rgba(67,243,255,.20), 0 18px 40px rgba(0,0,0,.28); }
.eyebrow, .tag { font-family: JetBrains Mono, ui-monospace, monospace; letter-spacing:.04em; }

#shader-lines-canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: -2; pointer-events: none; opacity: .46; mix-blend-mode: screen; }
body::after { content:""; position:fixed; inset:0; z-index:-1; pointer-events:none; background:radial-gradient(circle at 20% 18%, rgba(124,92,255,.26), transparent 34rem), radial-gradient(circle at 82% 10%, rgba(48,213,200,.16), transparent 30rem), linear-gradient(135deg, rgba(9,13,26,.72), rgba(11,16,32,.84) 54%, rgba(5,8,18,.96)); }
@media (prefers-reduced-motion: reduce) { #shader-lines-canvas { display:none; } }


@media (prefers-reduced-motion: reduce) { .btn.primary::before { animation: none; display:none; } }
