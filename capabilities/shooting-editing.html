    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {

    html { scroll-behavior: smooth; }

      background: linear-gradient(135deg, var(--accent), var(--accent-2));

    .nav-links {

      align-items: center;
      gap: 18px;
      color: var(--muted);

    }

    .nav-links a:hover { color: var(--text); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;

    }

    .btn:hover { transform: translateY(-2px); background: rgba(255,255,255,0.14); }
    .btn.primary { border: 0; background: linear-gradient(135deg, var(--accent), #9d7bff); position: relative; overflow: hidden; isolation: isolate; }
    .btn.primary::before { content:""; position:absolute; inset:-2px; transform: translateX(-130%) skewX(-18deg); background: linear-gradient(90deg, transparent, rgba(255,255,255,.18), rgba(255,255,255,.72), rgba(255,255,255,.18), transparent); animation: shiny-sweep 3.2s cubic-bezier(.22,1,.36,1) infinite; z-index:-1; }
    .btn.primary::after { content:""; position:absolute; inset:1px; border-radius:inherit; background: linear-gradient(135deg, rgba(48,213,200,.86), rgba(157,123,255,.92)); z-index:-2; }
    @keyframes shiny-sweep { 0%, 35% { transform: translateX(-130%) skewX(-18deg); opacity: 0; } 45% { opacity: 1; } 72%, 100% { transform: translateX(130%) skewX(-18deg); opacity: 0; } }
    .btn.primary:hover { background: linear-gradient(135deg, #8d72ff, #b092ff); }

    .hero {

      grid-template-columns: 1.1fr 0.9fr;
      align-items: center;
      gap: 52px;
    }

    .eyebrow {

      align-items: center;
      color: #c7d2ff;
      background: rgba(124, 92, 255, 0.14);
      border: 1px solid rgba(124, 92, 255, 0.32);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      margin-bottom: 22px;
    }

      margin: -10px 0 22px;
    }

    .file-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .file-label:hover { transform: translateY(-2px); background: rgba(255,255,255,0.14); }
    .file-label input { display: none; }

    .text-button {
      min-height: 38px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: transparent;
      color: var(--muted);

      font-weight: 700;
      cursor: pointer;
    }

    .text-button:hover { color: var(--text); background: rgba(255,255,255,0.08); }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      color: #d9fffb;
      font-size: 14px;
      margin-bottom: 14px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #30d5c8;
      box-shadow: 0 0 0 8px rgba(48, 213, 200, 0.12);
    }

    .profile-card h2 { font-size: 28px; margin-bottom: 8px; }
    .profile-card p { color: var(--muted); }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 26px;
    }

    .stat {
      padding: 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--line);
    }

    .stat strong { display: block; font-size: 24px; }
    .stat span { color: var(--muted); font-size: 13px; }

    section { padding: 48px 0; }
    .section-title { font-size: clamp(28px, 4vw, 44px); letter-spacing: -0.04em; margin-bottom: 14px; }
    .section-subtitle { color: var(--muted); max-width: 680px; margin-bottom: 26px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .card {
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 26px;
      background: var(--card);
      transition: transform 0.22s ease, background 0.22s ease, border-color 0.22s ease;

    .card .icon { font-size: 30px; margin-bottom: 18px; }
    .card h3 { margin-bottom: 10px; font-size: 20px; }
    .card p { color: var(--muted); }

    .projects {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .project {
      min-height: 230px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 24px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(124, 92, 255, 0.16), rgba(255,255,255,0.07));
    }

    .tag-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 18px; }
    .tag { display:inline-flex; padding: 6px 10px; border: 1px solid var(--line); border-radius: 999px; color: #d8def4; font-size: 12px; text-decoration:none; transition: transform .2s ease, background .2s ease, border-color .2s ease; }
    .tag:hover { transform: translateY(-2px); background: rgba(48,213,200,.12); border-color: rgba(48,213,200,.5); color:#fff; }

    .contact-panel {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 24px;
      padding: 30px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 30px;
      background: linear-gradient(135deg, rgba(48, 213, 200, 0.16), rgba(124, 92, 255, 0.16));
      box-shadow: var(--shadow);
    }

    footer { padding: 34px 0 44px; color: var(--muted); border-top: 1px solid var(--line); }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translate(-50%, 24px);
      opacity: 0;
      pointer-events: none;
      padding: 12px 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(15, 22, 44, 0.92);
      color: var(--text);
      box-shadow: var(--shadow);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    @media (max-width: 820px) {
      .hero, .contact-panel { grid-template-columns: 1fr; }
      .grid, .projects { grid-template-columns: 1fr; }
      .nav-links { display: none; }
      .stats { grid-template-columns: 1fr; }
      .hero { padding-top: 54px; }
    }
