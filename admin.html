<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>CIWei Admin</title>
<style>
body{margin:0;padding:28px;background:#030711;color:#ecfbff;font-family:system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif}body:before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 20% 10%,rgba(0,234,255,.25),transparent 30%),radial-gradient(circle at 90% 0,rgba(139,92,255,.25),transparent 30%),linear-gradient(135deg,#020611,#071123);z-index:-1}.wrap{max-width:1080px;margin:auto}.panel,.hero,.card{border:1px solid rgba(190,240,255,.22);background:linear-gradient(135deg,rgba(255,255,255,.11),rgba(0,234,255,.055),rgba(139,92,255,.075));box-shadow:inset 0 1px rgba(255,255,255,.18),0 24px 80px rgba(0,0,0,.42),0 0 44px rgba(0,234,255,.12);backdrop-filter:blur(28px) saturate(1.5);border-radius:28px}.hero{padding:30px;margin-bottom:18px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.logo{font-weight:900;color:#00eaff}.pill{color:#ecfbff;text-decoration:none;border:1px solid rgba(190,240,255,.22);border-radius:999px;padding:10px 14px;background:rgba(255,255,255,.06)}h1{font-size:48px;margin:8px 0;background:linear-gradient(135deg,#fff,#00eaff,#ff3df2);-webkit-background-clip:text;color:transparent}.lead,.hint{color:#9fb1c5;line-height:1.75}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.panel{padding:22px;margin-bottom:18px}.form{display:grid;gap:14px}.field{display:grid;gap:8px}input,select,button{min-height:46px;border-radius:14px;border:1px solid rgba(255,255,255,.16);background:rgba(0,0,0,.24);color:#ecfbff;padding:0 14px;font:inherit}input[type=file]{padding:11px 14px}button{cursor:pointer;font-weight:900;background:linear-gradient(135deg,#00eaff,#8b5cff);border:0;color:#03101b}.preview{aspect-ratio:16/10;border-radius:22px;border:1px solid rgba(255,255,255,.18);overflow:hidden;background:rgba(255,255,255,.04);display:grid;place-items:center}.preview img,.card img{width:100%;height:100%;object-fit:cover}.status{white-space:pre-wrap;background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:16px;min-height:130px;font-family:monospace}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.card{padding:12px}.card img{aspect-ratio:4/3;border-radius:18px;border:1px solid rgba(255,255,255,.16)}.card h3{font-size:15px;margin:10px 4px 3px}.card p{font-size:12px;color:#9fb1c5;margin:0 4px 4px}@media(max-width:850px){.grid{grid-template-columns:1fr}.cards{grid-template-columns:1fr 1fr}}@media(max-width:560px){body{padding:16px}.cards{grid-template-columns:1fr}}
</style>
</head>
<body><main class="wrap">
<div class="top"><div class="logo">CIWei Admin Console</div><a class="pill" href="works.html" target="_blank">打开作品页</a></div>
<section class="hero"><div class="hint">Private cover editor</div><h1>作品封面管理</h1><p class="lead">公开作品页只允许浏览、筛选和点击交互，不能修改图片。只有你打开这个管理页并输入 GitHub 令牌后，才可以替换封面并发布到线上。</p></section>
<section class="panel"><b>安全说明：</b><span class="hint"> 这个页面不放进公开导航；令牌只在当前浏览器临时使用，不写入网站文件。不要把 GitHub 令牌发给别人。</span></section>
<section class="grid"><div class="panel form"><div class="field"><label>GitHub 令牌</label><input id="token" type="password" placeholder="粘贴 github_pat..."></div><div class="field"><label>选择封面</label><select id="caseSelect"></select></div><div class="field"><label>上传新图片</label><input id="file" type="file" accept="image/png,image/jpeg,image/webp,image/svg+xml"><div class="hint">建议 16:10 或 4:3，深色科技风、霓虹色会更协调。</div></div><div class="preview" id="preview"><span class="hint">选择图片后预览</span></div><button id="publish">发布到线上</button></div><div class="panel"><div class="hint">Publish status</div><div class="status" id="status">等待操作...</div></div></section>
<section class="panel"><div class="hint">Current work covers</div><div class="cards" id="cards"></div></section>
</main>
<script>
var owner="CIWei178";var repo="ciwei";var branch="main";
var cases=[{id:1,title:"产品种草短视频",path:"assets/case-covers/product-seeding.svg"},{id:2,title:"账号内容排期",path:"assets/case-covers/account-schedule.svg"},{id:3,title:"爆款选题拆解",path:"assets/case-covers/topic-breakdown.svg"},{id:4,title:"口播视频剪辑",path:"assets/case-covers/talking-edit.svg"},{id:5,title:"账号定位优化",path:"assets/case-covers/account-positioning.svg"},{id:6,title:"短视频脚本模板",path:"assets/case-covers/script-template.svg"}];
function el(id){return document.getElementById(id)}function setStatus(t){el("status").textContent=t}
function init(){el("caseSelect").innerHTML=cases.map(function(c){return "<option value="+c.id+">"+c.id+". "+c.title+"</option>"}).join("");renderCards()}
function renderCards(){el("cards").innerHTML=cases.map(function(c){return "<article class=card><img src="+c.path+"?v="+Date.now()+"><h3>"+c.title+"</h3><p>"+c.path+"</p></article>"}).join("")}
el("file").addEventListener("change",function(){var f=el("file").files[0];if(!f)return;var url=URL.createObjectURL(f);el("preview").innerHTML="<img src="+url+">"});
async function gh(method,path,body){var token=el("token").value.trim();if(!token)throw new Error("请先输入 GitHub 令牌。");var res=await fetch("https://api.github.com"+path,{method:method,headers:{Authorization:"Bearer "+token,Accept:"application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28"},body:body?JSON.stringify(body):undefined});var data=await res.json().catch(function(){return {}});if(!res.ok)throw new Error(method+" failed: "+res.status+" "+(data.message||""));return data}
function toBase64(file){return new Promise(function(resolve,reject){var r=new FileReader();r.onload=function(){resolve(String(r.result).split(",")[1])};r.onerror=reject;r.readAsDataURL(file)})}
el("publish").onclick=async function(){try{var f=el("file").files[0];if(!f)throw new Error("请先选择一张图片。");var c=cases.find(function(x){return x.id==el("caseSelect").value});setStatus("正在验证令牌...");var me=await gh("GET","/user");setStatus("令牌有效："+me.login+"\n正在读取旧文件...");var apiPath="/repos/"+owner+"/"+repo+"/contents/"+c.path.split("/").map(encodeURIComponent).join("/");var old=await gh("GET",apiPath);setStatus("准备替换："+c.title+"\n正在上传 "+f.name);var content=await toBase64(f);await gh("PUT",apiPath,{message:"Update work cover: "+c.title,content:content,sha:old.sha,branch:branch});setStatus("发布成功！\n已替换："+c.title+"\nCloudflare 通常几十秒内自动更新。\n你可以打开作品页刷新查看。");setTimeout(renderCards,1600)}catch(e){setStatus("发布失败：\n"+e.message)}};
init();
</script></body></html>
