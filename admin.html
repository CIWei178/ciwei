<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>CIWei 管理</title><style>body{margin:0;min-height:100vh;padding:24px;background:radial-gradient(circle at 20% 10%,#06364a,transparent 30%),radial-gradient(circle at 90% 0,#26185c,transparent 32%),#030711;color:#ecfbff;font-family:system-ui}.wrap{max-width:980px;margin:auto}.box,.card{border:1px solid rgba(190,240,255,.22);background:linear-gradient(135deg,rgba(255,255,255,.11),rgba(0,234,255,.055),rgba(139,92,255,.075));box-shadow:0 24px 80px #0008,0 0 44px rgba(0,234,255,.12);backdrop-filter:blur(24px);border-radius:26px;padding:22px;margin:16px 0}h1{font-size:48px;margin:8px 0;background:linear-gradient(135deg,#fff,#00eaff,#ff3df2);-webkit-background-clip:text;color:transparent}.muted{color:#9fb1c5;line-height:1.7}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}input,select,button{width:100%;min-height:44px;border-radius:13px;border:1px solid rgba(255,255,255,.18);background:#0005;color:#ecfbff;padding:0 12px;font:inherit}input[type=file]{padding:10px 12px}button{background:linear-gradient(135deg,#00eaff,#8b5cff);color:#03101b;font-weight:900;border:0;cursor:pointer}.status{white-space:pre-wrap;background:#0006;border-radius:16px;padding:14px;min-height:110px;font-family:monospace}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.card{padding:10px}.card img,#preview img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:16px}.hide{display:none}.err{color:#ff9eb2}.ok{color:#00ff9d}@media(max-width:760px){.grid,.cards{grid-template-columns:1fr}}</style></head><body><main class="wrap"><div class="box"><p><a style="color:#ecfbff" href="works.html">返回作品页</a></p><p class="muted">Private cover editor</p><h1>作品封面管理</h1><p class="muted">先输入管理密码。验证通过后，才会显示上传和替换封面的操作区。</p></div><section id="auth" class="box"><h2>密码验证</h2><input id="pass" type="password" placeholder="输入管理密码"><p><button id="unlock">验证并进入</button></p><p id="msg" class="muted">未验证时不会显示上传入口。</p></section><section id="admin" class="hide"></section></main><script>
var P='CIWei2026',owner='CIWei178',repo='ciwei',branch='main';
var cases=[
['首页个人照片','assets/profile/avatar.svg'],
['产品种草短视频封面','assets/case-covers/product-seeding.svg'],
['账号内容排期封面','assets/case-covers/account-schedule.svg'],
['爆款选题拆解封面','assets/case-covers/topic-breakdown.svg'],
['口播视频剪辑封面','assets/case-covers/talking-edit.svg'],
['账号定位优化封面','assets/case-covers/account-positioning.svg'],
['短视频脚本模板封面','assets/case-covers/script-template.svg'],
['产品种草流程图','assets/case-detail/product-seeding-flow.svg'],
['账号排期流程图','assets/case-detail/account-schedule-flow.svg'],
['选题拆解流程图','assets/case-detail/topic-breakdown-flow.svg'],
['口播剪辑流程图','assets/case-detail/talking-edit-flow.svg'],
['账号定位流程图','assets/case-detail/account-positioning-flow.svg'],
['脚本模板流程图','assets/case-detail/script-template-flow.svg']
];
function e(id){return document.getElementById(id)}
e('unlock').onclick=function(){if(e('pass').value!==P){e('msg').innerHTML='<span class="err">密码错误</span>';return}sessionStorage.ok='1';show()};if(sessionStorage.ok==='1')show();
function show(){e('auth').className='hide';e('admin').className='';e('admin').innerHTML='<div class="box"><b class="ok">验证通过</b><p class="muted">现在可以上传并发布封面。还需要 GitHub 令牌才能真正修改线上文件。</p></div><div class="grid"><div class="box"><p><input id="token" type="password" placeholder="GitHub 令牌"></p><p><select id="sel"></select></p><p><input id="file" type="file" accept="image/png,image/jpeg,image/webp,image/svg+xml"></p><div id="preview" class="box muted">选择图片后预览</div><p><button id="pub">发布到线上</button></p><p><button onclick="sessionStorage.removeItem(\'ok\');location.reload()">退出管理区</button></p></div><div class="box"><h3>状态</h3><div id="st" class="status">等待操作...</div></div></div><div class="box"><h3>当前封面</h3><div id="cards" class="cards"></div></div>';init()}
function init(){e('sel').innerHTML=cases.map((c,i)=>'<option value="'+i+'">'+(i+1)+'. '+c[0]+'</option>').join('');var q=new URLSearchParams(location.search).get('target');if(q){var m={'avatar':0,'case-product-seeding':1,'case-account-schedule':2,'case-topic-breakdown':3,'case-talking-edit':4,'case-account-positioning':5,'case-script-template':6,'flow-product-seeding':7,'flow-account-schedule':8,'flow-topic-breakdown':9,'flow-talking-edit':10,'flow-account-positioning':11,'flow-script-template':12};if(m[q]!=null)e('sel').value=m[q];}cards();e('file').onchange=function(){var f=this.files[0];if(f)e('preview').innerHTML='<img src="'+URL.createObjectURL(f)+'">'};e('pub').onclick=pub}
function cards(){e('cards').innerHTML=cases.map(c=>'<div class="card"><img src="'+c[1]+'?v='+Date.now()+'"><b>'+c[0]+'</b><p class="muted">'+c[1]+'</p></div>').join('')}
function st(t){e('st').textContent=t}function b64(f){return new Promise((ok,no)=>{var r=new FileReader();r.onload=()=>ok(String(r.result).split(',')[1]);r.onerror=no;r.readAsDataURL(f)})}
async function gh(m,p,body){var t=e('token').value.trim();if(!t)throw Error('请先输入 GitHub 令牌');var r=await fetch('https://api.github.com'+p,{method:m,headers:{Authorization:'Bearer '+t,Accept:'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'},body:body?JSON.stringify(body):undefined});var d=await r.json().catch(()=>({}));if(!r.ok)throw Error(m+' '+r.status+' '+(d.message||''));return d}
async function pub(){try{var f=e('file').files[0];if(!f)throw Error('请先选择图片');var c=cases[+e('sel').value];st('验证令牌...');var me=await gh('GET','/user');var path=c[1];st('令牌有效：'+me.login+'\n读取旧文件...');var api='/repos/'+owner+'/'+repo+'/contents/'+path.split('/').map(encodeURIComponent).join('/');var old=await gh('GET',api);st('上传 '+c[0]+' ...');await gh('PUT',api,{message:'Update work cover: '+c[0],content:await b64(f),sha:old.sha,branch:branch});st('发布成功！几十秒后刷新作品页查看。');setTimeout(cards,1500)}catch(x){st('失败：\n'+x.message)}}
</script></body></html>
